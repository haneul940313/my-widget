<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정산 메모 위젯</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f7f7f8;
      color: #111;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid #e9e9ec;
      border-radius: 16px;
      padding: 14px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 10px;
    }
    .total-box {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #f4f4f6;
    }
    .total-box span {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .total-box strong {
      display: block;
      font-size: 26px;
      line-height: 1.1;
      color: #111;
    }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #444;
    }
    .input {
      width: 100%;
      height: 38px;
      border: 1px solid #d8d8de;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }
    .input:focus { border-color: #111; }
    .money-wrap {
      position: relative;
    }
    .money-wrap span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #666;
    }
    .money-wrap .input { padding-left: 28px; }
    .remain {
      margin-top: 2px;
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f4f4f6;
      font-size: 12px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .remain strong {
      font-size: 13px;
      color: #111;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      height: 36px;
      padding: 0 12px;
      border: 1px solid #d8d8de;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .memo-wrap {
      margin-top: 12px;
      background: #fff;
      border: 1px solid #e9e9ec;
      border-radius: 16px;
      overflow: hidden;
    }
    .memo-head,
    .memo-row {
      display: grid;
      grid-template-columns: 88px 1.4fr 1fr 1fr 1fr 52px;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      font-size: 12px;
    }
    .memo-head {
      background: #f4f4f6;
      font-weight: 700;
      color: #444;
      border-bottom: 1px solid #e9e9ec;
    }
    .memo-row {
      border-bottom: 1px solid #f0f0f2;
    }
    .memo-row:last-child { border-bottom: 0; }
    .cell {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell.title-cell {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cell.money {
      text-align: right;
    }
    .empty {
      padding: 18px 12px;
      text-align: center;
      color: #777;
      font-size: 12px;
      background: #fff;
    }
    .delete-btn {
      height: 28px;
      padding: 0 8px;
      font-size: 11px;
      justify-self: end;
    }
    @media (max-width: 640px) {
      .wrap { padding: 10px; }
      .memo-wrap { overflow-x: auto; }
      .memo-head,
      .memo-row {
        min-width: 700px;
      }
      .title { font-size: 17px; }
      .total-box strong { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">정산 메모장</h1>

      <div class="total-box">
        <span>총 정산금액</span>
        <strong id="totalSettlement">₩ 0</strong>
      </div>

      <div class="field">
        <label for="date">날짜</label>
        <input id="date" class="input" type="date" />
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" class="input" type="text" placeholder="예: 3월 외주 정산" />
      </div>

      <div class="field">
        <label for="currentAmount">현재금액</label>
        <div class="money-wrap">
          <span>₩</span>
          <input id="currentAmount" class="input" type="text" inputmode="numeric" placeholder="현재금액" />
        </div>
      </div>

      <div class="field">
        <label for="settlementAmount">정산금액</label>
        <div class="money-wrap">
          <span>₩</span>
          <input id="settlementAmount" class="input" type="text" inputmode="numeric" placeholder="정산금액" />
        </div>
      </div>

      <div class="remain">
        <span>남은금액</span>
        <strong id="remainingAmount">₩ 0</strong>
      </div>

      <div class="btn-row">
        <button id="addBtn" class="primary" type="button">등록</button>
        <button id="resetBtn" type="button">초기화</button>
      </div>
    </div>

    <div class="memo-wrap">
      <div class="memo-head">
        <div class="cell">날짜</div>
        <div class="cell">제목</div>
        <div class="cell money">현재금액</div>
        <div class="cell money">정산금액</div>
        <div class="cell money">남은금액</div>
        <div class="cell"></div>
      </div>
      <div id="list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'settlement-widget-items';

    const dateInput = document.getElementById('date');
    const titleInput = document.getElementById('title');
    const currentInput = document.getElementById('currentAmount');
    const settlementInput = document.getElementById('settlementAmount');
    const remainingAmountEl = document.getElementById('remainingAmount');
    const totalSettlementEl = document.getElementById('totalSettlement');
    const listEl = document.getElementById('list');
    const addBtn = document.getElementById('addBtn');
    const resetBtn = document.getElementById('resetBtn');

    function getToday() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseNumber(value) {
      return Number(String(value || '').replace(/[^0-9.-]/g, '')) || 0;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function formatInputValue(value) {
      const numeric = String(value).replace(/[^0-9]/g, '');
      return numeric ? Number(numeric).toLocaleString('ko-KR') : '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    let items = loadItems();

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function updateRemainingPreview() {
      const current = parseNumber(currentInput.value);
      const settlement = parseNumber(settlementInput.value);
      remainingAmountEl.textContent = `₩ ${formatNumber(current - settlement)}`;
    }

    function updateTotalSettlement() {
      const totalSettlement = items.reduce((sum, item) => sum + item.settlementAmount, 0);
      totalSettlementEl.textContent = `₩ ${formatNumber(totalSettlement)}`;
    }

    function renderList() {
      if (!items.length) {
        listEl.innerHTML = '<div class="empty">등록된 정산 내역이 없습니다.</div>';
        updateTotalSettlement();
        return;
      }

      listEl.innerHTML = items.map(item => {
        const remain = item.currentAmount - item.settlementAmount;
        return `
          <div class="memo-row">
            <div class="cell">${item.date}</div>
            <div class="cell title-cell">${escapeHtml(item.title)}</div>
            <div class="cell money">₩ ${formatNumber(item.currentAmount)}</div>
            <div class="cell money">₩ ${formatNumber(item.settlementAmount)}</div>
            <div class="cell money">₩ ${formatNumber(remain)}</div>
            <button class="delete-btn" data-id="${item.id}" type="button">삭제</button>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const id = Number(this.dataset.id);
          items = items.filter(item => item.id !== id);
          saveItems();
          renderList();
        });
      });

      updateTotalSettlement();
    }

    function resetForm() {
      dateInput.value = getToday();
      titleInput.value = '';
      currentInput.value = '';
      settlementInput.value = '';
      updateRemainingPreview();
    }

    dateInput.value = getToday();

    [currentInput, settlementInput].forEach(input => {
      input.addEventListener('input', e => {
        e.target.value = formatInputValue(e.target.value);
        updateRemainingPreview();
      });
    });

    addBtn.addEventListener('click', function () {
      const title = titleInput.value.trim();
      if (!title) {
        alert('내용을 입력하세요.');
        titleInput.focus();
        return;
      }

      items.unshift({
        id: Date.now(),
        date: dateInput.value || getToday(),
        title,
        currentAmount: parseNumber(currentInput.value),
        settlementAmount: parseNumber(settlementInput.value)
      });

      saveItems();
      renderList();
      resetForm();
    });

    resetBtn.addEventListener('click', resetForm);

    updateRemainingPreview();
    renderList();
  </script>
</body>
</html>
